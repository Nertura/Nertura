name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: CSS import architecture
        run: pnpm check:css-imports

      - name: Legacy chat guard
        run: pnpm test:no-legacy-chat

      - name: Tier navigation
        run: pnpm test:tier-navigation

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: i18n guard
        run: pnpm check:i18n

      - name: Doctor language lock
        run: pnpm test:doctor-language
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Doctor vision language
        run: pnpm test:doctor-vision-language
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: true

      - name: Projects engine
        run: pnpm test:projects-engine
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: true

      - name: Dashboard interactions guard
        run: pnpm test:dashboard-interactions

      # CSS smoke tests require live servers — run locally after `pnpm build && pnpm start`
      # See docs/deployment/CI_CD_README.md
