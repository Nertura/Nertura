# For a full reference to the Supabase CLI config, see:
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "nertura"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed/seed.sql"]

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3001"
additional_redirect_urls = [
  "http://localhost:3000/**",
  "http://localhost:3001/**",
  "http://localhost:3002/**",
  "http://192.168.1.104:3000/**",
  "http://192.168.1.104:3001/**",
  "http://192.168.1.102:3000/**",
  "http://192.168.1.102:3001/**",
  "https://nertura.com/**",
  "https://www.nertura.com/**",
  "https://app.nertura.com/**",
  "https://admin.nertura.com/**",
  "https://*.vercel.app/**",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.mfa]
max_enrolled_factors = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# OAuth — configure credentials in Supabase Dashboard for hosted projects.
# Local dev: set GOOGLE_CLIENT_ID/SECRET and APPLE_* in supabase/.env or shell.
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
skip_nonce_check = false

[auth.external.apple]
enabled = true
client_id = "env(APPLE_CLIENT_ID)"
secret = "env(APPLE_CLIENT_SECRET)"

# SMS OTP disabled until provider, rate limits, and CAPTCHA are configured.
[auth.sms]
enable_signup = false
enable_confirmations = false
max_frequency = "60s"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
